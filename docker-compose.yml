version: '3.8'

services:
  # 1. Main Database
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: tradeos-postgres
    environment:
      POSTGRES_USER: tradeos_admin
      POSTGRES_PASSWORD: tradeos_secure_password
      POSTGRES_DB: tradeos_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Fast Cache Memory
  redis:
    image: redis:7-alpine
    container_name: tradeos-redis
    ports:
      - "6379:6379"

  # 3. Screenshot Storage
  minio:
    image: minio/minio:latest
    container_name: tradeos-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secure_password
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata: